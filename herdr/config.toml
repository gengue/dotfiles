onboarding = false
[experimental]
pane_history = false

# herdr plus keybindings

[[keys.command]]
key = "prefix+up"
type = "plugin_action"
command = "cloudmanic.herdr-plus.projects"
description = "herdr-plus: projects"

[[keys.command]]
key = "prefix+down"
type = "plugin_action"
command = "cloudmanic.herdr-plus.quick-actions"
description = "herdr-plus: quick actions"

# file viewer keybindings
[[keys.command]]              # open in a split beside your work
key = "prefix+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer --plugin herdr-file-viewer"

[[keys.command]]              # …or in its own tab
key = "prefix+shift+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer-tab --plugin herdr-file-viewer"

# lazygit
[[keys.command]]
key = "ctrl+alt+g"
type = "shell"
command = "herdr plugin action invoke open-lazygit --plugin herdr-lazygit"

[[keys.command]]
key = "ctrl+alt+shift+g"
type = "shell"
command = "herdr plugin action invoke open-lazygit-tab --plugin herdr-lazygit"

# instala esto despues de tener el workbox/homelab: https://github.com/nikok6/herdr-mirror
